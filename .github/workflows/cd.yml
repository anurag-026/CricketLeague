name: CD

on:
  push:
    branches: [main]
    tags: ['v*.*.*']
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mol-backend
  FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/mol-frontend

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.BACKEND_IMAGE }}
            ${{ env.FRONTEND_IMAGE }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=raw,value=main-${{ github.run_number }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Push backend
        uses: docker/build-push-action@v6
        with:
          context: mol-backend
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:sha-${{ github.sha }},${{ env.BACKEND_IMAGE }}:main-${{ github.run_number }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push frontend
        uses: docker/build-push-action@v6
        with:
          context: mol-frontend
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:sha-${{ github.sha }},${{ env.FRONTEND_IMAGE }}:main-${{ github.run_number }}
          build-args: |
            VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}
            VITE_WS_URL=${{ vars.VITE_WS_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy staging (Render + Cloudflare Pages)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.app.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render backend deploy (staging)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_STAGING_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK"

      - name: Trigger Cloudflare Pages deploy (staging)
        env:
          CLOUDFLARE_PAGES_STAGING_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_STAGING_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST "$CLOUDFLARE_PAGES_STAGING_DEPLOY_HOOK"

      - name: Smoke test
        run: |
          curl -sf "${{ vars.STAGING_API_URL }}/actuator/health" | grep -q UP

  deploy-production:
    name: Deploy production (Render + Cloudflare Pages)
    needs: build-and-push
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://app.example.com
    steps:
      - uses: actions/checkout@v4

      - name: Trigger Render backend deploy (production)
        env:
          RENDER_DEPLOY_HOOK: ${{ secrets.RENDER_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST "$RENDER_DEPLOY_HOOK"

      - name: Trigger Cloudflare Pages deploy (production)
        env:
          CLOUDFLARE_PAGES_PRODUCTION_DEPLOY_HOOK: ${{ secrets.CLOUDFLARE_PAGES_PRODUCTION_DEPLOY_HOOK_URL }}
        run: |
          curl -X POST "$CLOUDFLARE_PAGES_PRODUCTION_DEPLOY_HOOK"

      - name: Smoke test
        run: |
          curl -sf "${{ vars.PRODUCTION_API_URL }}/actuator/health" | grep -q UP
