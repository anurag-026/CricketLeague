# Production-like local / single-node stack. Not for multi-AZ cloud production.
name: mol-prod

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mol}
      POSTGRES_USER: ${POSTGRES_USER:-mol}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
    volumes:
      - mol_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-mol} -d ${POSTGRES_DB:-mol}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks: [mol-internal]

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes', '--maxmemory', '256mb', '--maxmemory-policy', 'allkeys-lru']
    volumes:
      - mol_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    networks: [mol-internal]

  backend:
    build:
      context: ../../mol-backend
      dockerfile: Dockerfile
    image: ${MOL_BACKEND_IMAGE:-mol-backend:local}
    environment:
      SPRING_PROFILES_ACTIVE: prod
      JWT_SECRET: ${JWT_SECRET:?set JWT_SECRET}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-mol}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-mol}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      MOL_CORS_ALLOWED_ORIGINS: ${MOL_CORS_ALLOWED_ORIGINS:-http://localhost}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - '8080:8080'
    healthcheck:
      test: ['CMD-SHELL', 'curl -sf http://localhost:8080/actuator/health/readiness || exit 1']
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s
    restart: unless-stopped
    networks: [mol-internal]

  frontend:
    build:
      context: ../../mol-frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080}
        VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:8080/ws/game}
    image: ${MOL_FRONTEND_IMAGE:-mol-frontend:local}
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks: [mol-internal]

volumes:
  mol_pg_data:
  mol_redis_data:

networks:
  mol-internal:
    driver: bridge
