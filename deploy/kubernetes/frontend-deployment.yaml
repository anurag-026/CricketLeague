apiVersion: apps/v1
kind: Deployment
metadata:
  name: mol-frontend
  namespace: mol
  labels:
    app: mol-frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mol-frontend
  template:
    metadata:
      labels:
        app: mol-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/YOUR_ORG/mol-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
              name: http
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mol-frontend
  namespace: mol
spec:
  selector:
    app: mol-frontend
  ports:
    - port: 80
      targetPort: 80
      name: http
  type: ClusterIP
