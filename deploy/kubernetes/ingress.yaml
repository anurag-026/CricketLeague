apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mol-ingress
  namespace: mol
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: 'true'
  # WebSocket + STOMP: long timeouts and sticky sessions when API replicas > 1
    nginx.ingress.kubernetes.io/proxy-read-timeout: '3600'
    nginx.ingress.kubernetes.io/proxy-send-timeout: '3600'
    nginx.ingress.kubernetes.io/affinity: cookie
    nginx.ingress.kubernetes.io/session-cookie-name: mol-route
    nginx.ingress.kubernetes.io/session-cookie-max-age: '172800'
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - app.example.com
        - api.example.com
      secretName: mol-tls
  rules:
    - host: app.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mol-frontend
                port:
                  number: 80
    - host: api.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: mol-backend
                port:
                  number: 80
---
# Optional: HorizontalPodAutoscaler for API (after broker scaling fix)
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: mol-backend-hpa
  namespace: mol
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: mol-backend
  minReplicas: 1
  maxReplicas: 4
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
