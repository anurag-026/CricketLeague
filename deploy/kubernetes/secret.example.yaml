# Copy to secret.yaml, fill values, apply once. Prefer External Secrets Operator in real prod.
apiVersion: v1
kind: Secret
metadata:
  name: mol-backend-secrets
  namespace: mol
type: Opaque
stringData:
  JWT_SECRET: replace-with-32-plus-char-secret
  SPRING_DATASOURCE_URL: jdbc:postgresql://your-host:5432/postgres?sslmode=require
  SPRING_DATASOURCE_USERNAME: postgres.your-project-ref
  SPRING_DATASOURCE_PASSWORD: replace-me
  SPRING_DATA_REDIS_HOST: your-redis.aivencloud.com
  SPRING_DATA_REDIS_PORT: '16339'
  SPRING_DATA_REDIS_USERNAME: default
  SPRING_DATA_REDIS_PASSWORD: replace-me
  SPRING_DATA_REDIS_SSL_ENABLED: 'true'
  MOL_CORS_ALLOWED_ORIGINS: http://localhost:3000
