apiVersion: apps/v1
kind: Deployment
metadata:
  name: mol-backend
  namespace: mol
  labels:
    app: mol-backend
spec:
  replicas: 1  # Increase only after Redis STOMP relay — see deploy/README.md
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: mol-backend
  template:
    metadata:
      labels:
        app: mol-backend
    spec:
      terminationGracePeriodSeconds: 45
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: backend
          image: mol-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          envFrom:
            - configMapRef:
                name: mol-backend-config
            - secretRef:
                name: mol-backend-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: '1'
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          lifecycle:
            preStop:
              exec:
                command: ['sh', '-c', 'sleep 15']
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: mol-backend-pdb
  namespace: mol
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: mol-backend
---
apiVersion: v1
kind: Service
metadata:
  name: mol-backend
  namespace: mol
spec:
  selector:
    app: mol-backend
  ports:
    - port: 80
      targetPort: 8080
      name: http
  type: ClusterIP
