# Production profile — override via environment variables / secrets

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false

# Actuator (requires spring-boot-starter-actuator on classpath)
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=when_authorized
management.health.livenessState.enabled=true
management.health.readinessState.enabled=true

# Graceful shutdown for STOMP drain
server.shutdown=graceful
spring.lifecycle.timeout-per-shutdown-phase=30s

# Logging
logging.level.root=WARN
logging.level.com.mol.anurag=INFO

# Datasource / Redis — set via env in orchestrator
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}

spring.data.redis.host=${SPRING_DATA_REDIS_HOST}
spring.data.redis.port=${SPRING_DATA_REDIS_PORT:6379}
spring.data.redis.username=${SPRING_DATA_REDIS_USERNAME:}
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}
spring.data.redis.ssl.enabled=${SPRING_DATA_REDIS_SSL_ENABLED:false}

mol.jwt.secret=${JWT_SECRET}
mol.cors.allowed-origins=${MOL_CORS_ALLOWED_ORIGINS:}
