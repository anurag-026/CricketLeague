spring.application.name=mol-backend

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/mol
spring.datasource.username=mol
spring.datasource.password=mol
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# JWT (override in production via env)
mol.jwt.secret=${JWT_SECRET:ZBL-Hand-Cricket-Dev-Secret-Key-Min-32-Chars!!}
mol.jwt.expiration-ms=86400000

# Match / room
mol.room.code-length=6
mol.room.ttl-seconds=600
mol.matchmaking.estimated-wait-seconds=10
mol.matchmaking.queue-team-size=1
mol.matchmaking.queue-overs=5
