services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: mol
      POSTGRES_USER: mol
      POSTGRES_PASSWORD: mol
    ports:
      - "5432:5432"
    volumes:
      - mol_pg_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  mol_pg_data: